name: Backend CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest
        if [ -f services/api-gateway/requirements.txt ]; then pip install -r services/api-gateway/requirements.txt; fi
        
    - name: Lint with Ruff
      run: |
        ruff check services/api-gateway/app
        
    # Placeholder for actual Pytest execution when tests are written
    - name: Run Pytest
      run: |
        echo "Running backend tests..."
